name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: skip if release already exists
        # `bun build --compile` is not bit-reproducible: every build bakes
        # its own timestamp + build-version into the binary, so re-running
        # this workflow on the same tag (e.g. after a force-push of the
        # tag) would produce different sha256s and break any downstream
        # consumers (Homebrew tap, mirrors, etc.). Bail out if the release
        # for this tag already has artifacts attached.
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' | grep -q "swrag-darwin"; then
            echo "Release ${GITHUB_REF_NAME} already has artifacts — refusing to rebuild and overwrite sha256s. Delete the release if you really want a rebuild."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.skip != 'true'
        with:
          bun-version: latest
      - name: install brew sqlite
        if: steps.check.outputs.skip != 'true'
        run: brew install sqlite
      - if: steps.check.outputs.skip != 'true'
        run: bun install --frozen-lockfile
      - if: steps.check.outputs.skip != 'true'
        run: bun run typecheck
      - name: regenerate fixtures
        if: steps.check.outputs.skip != 'true'
        run: bun run tests/fixtures/make-fixtures.ts
      - name: fetch vendor dylibs
        if: steps.check.outputs.skip != 'true'
        run: bun run scripts/fetch-vec-dylibs.ts
      - name: build swift helper
        # The Swift helper binary is imported at module-load time via Bun's
        # `with { type: "file" }` attribute (src/mac/helper.ts). Any test
        # that spawns the swrag CLI as a subprocess (tests/cli.test.ts) or
        # imports the helper module (tests/mac/*, tests/bootstrap.test.ts,
        # tests/doctor.test.ts) fails with "Cannot find module" if the
        # binary isn't on disk. Build it before the test phase rather
        # than only inside `bun run build`.
        if: steps.check.outputs.skip != 'true'
        run: bash scripts/build-swift-helper.sh
      - if: steps.check.outputs.skip != 'true'
        run: bun test
      - if: steps.check.outputs.skip != 'true'
        run: bun run build
      - uses: softprops/action-gh-release@v2
        if: steps.check.outputs.skip != 'true'
        with:
          files: |
            dist/swrag-darwin-arm64.tar.gz
            dist/swrag-darwin-x64.tar.gz
            dist/sha256sums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Optional: auto-bump the downstream tap on every tagged release.
  # Requires repo secret `TAP_GH_TOKEN`: a personal-access token with
  # `contents:write` on NikitaHerndlhofer/homebrew-tap. Until that secret
  # is set up, the tap is bumped manually — see docs/architecture.md.
  #
  # bump-tap:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: mislav/bump-homebrew-formula-action@v3
  #       with:
  #         formula-name: superwhisper-rag
  #         homebrew-tap: NikitaHerndlhofer/homebrew-tap
  #         download-url: https://github.com/NikitaHerndlhofer/superwhisper-rag/releases/download/${{ github.ref_name }}/swrag-darwin-arm64.tar.gz
  #       env:
  #         COMMITTER_TOKEN: ${{ secrets.TAP_GH_TOKEN }}
